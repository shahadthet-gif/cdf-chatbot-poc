version: "3.1"

rules:
- rule: Start conversation with a language choice
  steps:
    - intent: widget_opened
    - action: utter_choose_language

- rule: Greet after language is chosen (or free-typed greeting)
  steps:
    - intent: greet
    - action: utter_greet

- rule: Say goodbye
  steps:
    - intent: goodbye
    - action: utter_goodbye

- rule: Respond to thanks
  steps:
    - intent: thank_you
    - action: utter_thank_you

- rule: Answer bot challenge
  steps:
    - intent: bot_challenge
    - action: utter_bot_challenge

- rule: Answer general fund question
  steps:
    - intent: ask_about_fund
    - action: utter_ask_about_fund

- rule: Show the main menu again
  steps:
    - intent: show_menu
    - action: utter_show_menu

- rule: Show the apply-for-services submenu
  steps:
    - intent: show_apply_menu
    - action: utter_show_apply_menu

- rule: Show the learn-more submenu
  steps:
    - intent: show_learn_more_menu
    - action: utter_show_learn_more_menu

- rule: Show the contact submenu
  steps:
    - intent: show_contact_menu
    - action: utter_show_contact_menu

- rule: Answer funding services question
  steps:
    - intent: ask_about_funding_services
    - action: utter_ask_about_funding_services

- rule: Answer enablement services question
  steps:
    - intent: ask_about_enablement_services
    - action: utter_ask_about_enablement_services

- rule: Answer strategy question
  steps:
    - intent: ask_about_strategy
    - action: utter_ask_about_strategy

- rule: Answer success stories question
  steps:
    - intent: ask_about_success_stories
    - action: utter_ask_about_success_stories

- rule: Answer visual identity question
  steps:
    - intent: ask_about_visual_identity
    - action: utter_ask_about_visual_identity

- rule: Answer news question
  steps:
    - intent: ask_about_news
    - action: utter_ask_about_news

- rule: Answer digital channels question
  steps:
    - intent: ask_about_digital_channels
    - action: utter_ask_about_digital_channels

- rule: Answer direct contact question
  steps:
    - intent: ask_about_direct_contact
    - action: utter_ask_about_direct_contact

- rule: Hand off to a human agent on request
  steps:
    - intent: request_human_agent
    - action: utter_handoff_to_agent

- rule: Handle out-of-scope questions
  steps:
    - intent: out_of_scope
    - action: utter_out_of_scope

- rule: Handle low-confidence messages via fallback
  steps:
    - intent: nlu_fallback
    - action: utter_out_of_scope
