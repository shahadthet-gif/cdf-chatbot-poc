# Render Blueprint — deploys 2 of this POC's 3 pieces (website + live-chat
# proxy). Rasa itself runs on Hugging Face Spaces instead (see
# rasa-bot/README.md) — Render's free tier (512MB RAM) isn't enough for
# Rasa + TensorFlow at runtime; HF Spaces' free CPU tier (16GB) is.
#
# In the Render dashboard: New -> Blueprint -> connect this repo -> Apply.
#
# "cdf-poc-website" is chosen to match ALLOWED_ORIGIN below and the URL
# hardcoded in website/js/chatwoot-integration.js. If it's already taken on
# Render (subdomains are global), you'll need to pick a different one here
# AND update that JS file to match.
#
# The three CHATWOOT_* secrets are intentionally left blank here (sync:
# false) — Render will prompt you to fill them in during Blueprint setup,
# so they never sit in this committed file. See chatwoot-proxy/.env.example
# for what's needed.

services:
  - type: web
    name: cdf-poc-chatwoot-proxy
    env: node
    plan: free
    rootDir: chatwoot-proxy
    buildCommand: ""
    startCommand: node server.js
    envVars:
      - key: CHATWOOT_ACCOUNT_ID
        sync: false
      - key: CHATWOOT_API_TOKEN
        sync: false
      - key: CHATWOOT_INBOX_ID
        sync: false
      - key: ALLOWED_ORIGIN
        value: https://cdf-poc-website.onrender.com

  - type: web
    name: cdf-poc-website
    env: python
    plan: free
    rootDir: website
    buildCommand: ""
    startCommand: python serve.py
