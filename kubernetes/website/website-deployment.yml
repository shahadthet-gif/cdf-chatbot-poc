apiVersion: apps/v1
kind: Deployment
metadata:
  name: website-deployment

spec:
  replicas: 1
  selector:
    matchLabels:
      app: website
  template:
    metadata:
      labels:
        app: website
    spec:
      containers:
       - name: website
         image: cdfchatbot-website:v4
         imagePullPolicy: IfNotPresent
         ports:
          - containerPort: 5500
